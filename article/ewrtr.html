<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ewrtr</title>
    <style>
        :root {
            --bg: #f9f9f9;
            --paper: #fff;
            --text: #333;
            --text-light: #666;
            --border: #ddd;
            --accent: #800000;
            --code-bg: #f4f4f4;
            --tag-bg: #f0f0f0;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --paper: #242424;
            --text: #e0e0e0;
            --text-light: #aaa;
            --border: #444;
            --accent: #ff4d4d;
            --code-bg: #333;
            --tag-bg: #2d2d2d;
        }

        body {
            font-family: Georgia, serif;
            line-height: 1.8;
            color: var(--text);
            background: var(--bg);
            margin: 0;
            padding: 0;
            transition: background 0.2s;
        }

        .wrapper {
            max-width: 750px;
            margin: 40px auto;
            padding: 50px;
            background: var(--paper);
            border: 1px solid var(--border);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            font-size: 12px;
            color: var(--text-light);
            font-family: sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toolbar a { color: var(--text-light); text-decoration: none; }
        .controls { display: flex; gap: 8px; }
        .btn { background: none; border: 1px solid var(--border); color: var(--text); cursor: pointer; padding: 3px 10px; font-size: 10px; border-radius: 2px; }

        .article-header { margin-bottom: 50px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .course-label { font-family: sans-serif; color: var(--accent); font-weight: 600; font-size: 12px; margin-bottom: 10px; display: block; text-transform: uppercase; }
        
        h1 { font-size: 36px; margin: 0 0 15px 0; line-height: 1.1; font-weight: normal; color: var(--text); }
        
        .article-meta-info { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            font-size: 12px;
            color: var(--text-light);
            font-family: sans-serif;
        }
        .meta-item span { display: block; font-weight: 600; color: var(--text); margin-bottom: 2px; text-transform: uppercase; font-size: 10px; }

        .article-content { font-size: 18px; }
        .article-content.small { font-size: 15px; }
        .article-content.large { font-size: 22px; }

        .article-content img { max-width: 100%; height: auto; display: block; margin: 30px auto; border: 1px solid var(--border); }
        .article-content pre { background: var(--code-bg); padding: 20px; overflow-x: auto; font-family: monospace; font-size: 14px; border: 1px solid var(--border); margin: 30px 0; }
        .article-content h2 { margin-top: 50px; font-size: 24px; font-weight: normal; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        
        .tags-section { margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--border); }
        .tag-pill { background: var(--tag-bg); padding: 4px 10px; font-size: 11px; margin-right: 8px; color: var(--text-light); font-family: sans-serif; border-radius: 2px; text-decoration: none; }
        
        footer { text-align: center; margin-top: 60px; color: var(--text-light); font-size: 11px; font-family: sans-serif; }
    </style>
</head>
<body>
    
    <div class="wrapper">
        <div class="toolbar">
            <a href="/index">← Back to Overview</a>
            <div class="controls">
                <button class="btn" onclick="setFont('small')">A-</button>
                <button class="btn" onclick="setFont('normal')">A</button>
                <button class="btn" onclick="setFont('large')">A+</button>
                <button class="btn" id="theme-btn">Contrast</button>
            </div>
        </div>
        
        <header class="article-header">
            <span class="course-label">General Study</span>
            <h1>ewrtr</h1>
            
            <div class="article-meta-info">
                <div class="meta-item">
                    <span>Session Date</span>
                    April 23rd, 2026
                </div>
                <div class="meta-item">
                    <span>Doc Type</span>
                    Note
                </div>
                <div class="meta-item">
                    <span>Read Time</span>
                    
                    1 min
                </div>
            </div>
        </header>

        <div class="article-content" id="note-body">
            The internet is a good place to find educational work.
        </div>

        <div class="tags-section">
            
        </div>

        <footer>
            Academic document shared from personal archive
        </footer>
    </div>

    <script>
        const btn = document.getElementById('theme-btn');
        const storedTheme = localStorage.getItem('theme');
        if (storedTheme) {
            document.documentElement.setAttribute('data-theme', storedTheme);
        }
        btn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        });

        function setFont(size) {
            const body = document.getElementById('note-body');
            body.classList.remove('small', 'large');
            if (size === 'small') body.classList.add('small');
            if (size === 'large') body.classList.add('large');
        }
    </script>
</body>
</html>
