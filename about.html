<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <style>
        :root {
            --bg: #f9f9f9;
            --paper: #fff;
            --text: #333;
            --text-light: #777;
            --border: #eee;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --paper: #1e1e1e;
            --text: #ddd;
            --text-light: #999;
            --border: #333;
        }

        body { font-family: Georgia, serif; line-height: 1.8; color: var(--text); background: var(--bg); margin: 0; }
        .wrapper { max-width: 700px; margin: 40px auto; padding: 40px; background: var(--paper); border: 1px solid var(--border); }
        header { text-align: center; margin-bottom: 40px; position: relative; }
        h1 { font-weight: normal; }
        .theme-toggle { position: absolute; top: 0; right: 0; background: none; border: 1px solid var(--border); color: var(--text); padding: 5px 10px; cursor: pointer; font-size: 12px; }
        nav a { color: var(--text-light); text-decoration: none; margin: 0 10px; font-size: 14px; }
        .content { font-size: 17px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <button class="theme-toggle" id="theme-btn">Theme</button>
            <h1>About</h1>
            <nav>
                <a href="/index">Home</a>
                <a href="/archives">Archives</a>
                <a href="/about">About</a>
            </nav>
        </header>

        <div class="content">
            <p>This is a minimal note sharing platform. It is designed to be fast and readable, focusing entirely on the text.</p>
            <p>I have added accessibility features like font resizing and a theme toggle to make reading easier for everyone.</p>
        </div>
    </div>
    <script>
        const btn = document.getElementById('theme-btn');
        const updateBtnText = (t) => btn.textContent = t === 'dark' ? 'Light' : 'Dark';
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
            updateBtnText(currentTheme);
        }
        btn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateBtnText(theme);
        });
    </script>
</body>
</html>
